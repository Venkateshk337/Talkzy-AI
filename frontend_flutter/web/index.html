<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="english_learning_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>english_learning_ai</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="pronunciation.js"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // MethodChannel handler for pronunciation
    window.addEventListener('load', function() {
      if (window.flutter) {
        window.flutter.addEventListener('message', function(event) {
          const data = event.data;
          if (data.method === 'pronunciation.speak') {
            const success = window.speakText(data.arguments.text);
            // Send response back to Flutter
            window.flutter.postMessage({
              method: 'pronunciation.speak',
              result: success
            });
          } else if (data.method === 'pronunciation.stop') {
            const success = window.stopSpeech();
            window.flutter.postMessage({
              method: 'pronunciation.stop',
              result: success
            });
          } else if (data.method === 'pronunciation.pause') {
            const success = window.pauseSpeech();
            window.flutter.postMessage({
              method: 'pronunciation.pause',
              result: success
            });
          }
        });
      }
    });
  </script>
</body>
</html>
